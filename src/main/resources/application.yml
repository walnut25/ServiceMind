spring:
  application:
    name: smart-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:smart_service}
    password: ${DB_PASSWORD:smart_service}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8081}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

security:
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-change-me}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:30m}

bootstrap:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:Admin123!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
