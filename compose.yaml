services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: smart_service
      MYSQL_USER: smart_service
      MYSQL_PASSWORD: smart_service
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
